<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartKas Login</title>
<link rel="stylesheet" href="styleLogin.css">

<style>

</style>
</head>
<body>

  <div class="wrapper" id="wrapper">

    <!-- KIRI -->
    <div class="left" id="leftSide">
        <div class="left-content">
            <img src="asset/logo.png" alt="logo">
            <h1 id="judulKiri">SmartKas Dashboard</h1>
            <p id="subKiri">Atur keuangan dengan lebih mudah dan transparan</p>
        </div>
    </div>

    <!-- KANAN -->
    <div class="right">
        <div class="login-box">

            <!-- LOGIN -->
            <div id="loginForm">
                <label>Email</label>
                <input type="text">

                <label>Password</label>
                <input type="password">

                <div class="forgot">Forgot password</div>

                <button class="login-btn">Login</button>

                <div class="or">OR</div>

                <div class="social">
                    <button>Google</button>
                    <button onclick="toggleMode()">Sign In</button>
                </div>
            </div>

            <!-- REGISTER-->
            <div id="registerForm" style="display:none;">
                <label>Nama</label>
                <input type="text">

                <label>Email</label>
                <input type="text">

                <label>Password</label>
                <input type="password">

                <button class="login-btn">Daftar</button>

                <div class="or">Sudah punya akun?</div>
                <button onclick="toggleMode()">Login</button>
            </div>

        </div>
    </div>
